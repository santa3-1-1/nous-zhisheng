<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>知音 — 来电</title>
  <style>
    :root { --bg:#0a0a0a; --card:#1c1c1e; --border:#2c2c2e; --blue:#0a84ff; --green:#30d158; --orange:#ff9f0a; --red:#ff453a; --text:#fff; --text2:#ebebf5cc; --text3:#ebebf54d; }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:-apple-system,'SF Pro Display',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; -webkit-font-smoothing:antialiased; overflow:hidden; }

    /* ===== 来电界面（全屏） ===== */
    .incoming-screen {
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; padding:40px 24px;
      background:linear-gradient(180deg, #1a1a2e 0%, #0a0a0a 100%);
    }
    .incoming-screen.hidden { display:none; }

    .caller-avatar {
      width:96px; height:96px; border-radius:50%;
      background:linear-gradient(135deg,#667eea,#764ba2);
      display:flex; align-items:center; justify-content:center;
      font-size:40px; margin-bottom:20px;
      box-shadow:0 0 40px rgba(102,126,234,0.3);
      animation:avatarPulse 2s ease infinite;
    }
    @keyframes avatarPulse {
      0%,100%{box-shadow:0 0 40px rgba(102,126,234,0.3)}
      50%{box-shadow:0 0 60px rgba(102,126,234,0.5)}
    }

    .caller-name { font-size:28px; font-weight:700; margin-bottom:6px; }
    .caller-desc { font-size:15px; color:var(--text2); margin-bottom:48px; }

    .call-actions { display:flex; gap:48px; margin-top:auto; margin-bottom:60px; }
    .call-action {
      display:flex; flex-direction:column; align-items:center; gap:8px;
    }
    .call-action-btn {
      width:72px; height:72px; border-radius:50%; border:none;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; font-size:28px; transition:transform 0.2s;
    }
    .call-action-btn:active { transform:scale(0.9); }
    .call-action-label { font-size:13px; color:var(--text2); }
    .btn-answer { background:var(--green); color:#fff; animation:ringPulse 1.5s ease infinite; }
    .btn-decline { background:var(--red); color:#fff; }
    @keyframes ringPulse {
      0%,100%{transform:scale(1)} 50%{transform:scale(1.08)}
    }

    .incoming-hint { position:absolute; bottom:24px; font-size:12px; color:var(--text3); }

    /* ===== 通话界面 ===== */
    .call-screen {
      position:fixed; inset:0; display:none; flex-direction:column;
      padding:60px 24px 40px; background:var(--bg);
    }
    .call-screen.active { display:flex; }

    .call-header { text-align:center; margin-bottom:24px; }
    .call-header-name { font-size:20px; font-weight:700; margin-bottom:4px; }
    .call-header-status { font-size:14px; color:var(--text2); display:flex; align-items:center; justify-content:center; gap:6px; }
    .live-dot { width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

    .chat-area {
      flex:1; background:var(--card); border-radius:16px; padding:16px;
      overflow-y:auto; display:flex; flex-direction:column; gap:8px;
      border:1px solid var(--border); scroll-behavior:smooth;
    }
    .chat-area:empty::before { content:'接听后对话会显示在这里'; color:var(--text3); font-size:14px; text-align:center; margin:auto; }
    .bubble { max-width:80%; padding:10px 14px; border-radius:16px; font-size:15px; line-height:1.4; animation:fadeIn 0.2s; }
    .bubble-ai { background:rgba(10,132,255,0.12); color:#a5c5f7; align-self:flex-start; border-bottom-left-radius:4px; }
    .bubble-user { background:rgba(48,209,88,0.12); color:#9be6b4; align-self:flex-end; border-bottom-right-radius:4px; }
    .bubble-sys { align-self:center; font-size:12px; color:var(--text3); padding:4px 12px; background:rgba(255,255,255,0.04); border-radius:12px; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

    .call-footer { margin-top:20px; display:flex; justify-content:center; }
    .hangup-btn {
      width:64px; height:64px; border-radius:50%; border:none;
      background:var(--red); color:#fff; font-size:24px;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:transform 0.2s;
    }
    .hangup-btn:active { transform:scale(0.9); }
  </style>
</head>
<body>
  <!-- 来电界面 -->
  <div class="incoming-screen" id="incomingScreen">
    <div class="caller-avatar">📞</div>
    <div class="caller-name" id="callerName">来电</div>
    <div class="caller-desc" id="callerDesc">有人通过知音联系你</div>

    <div class="call-actions">
      <div class="call-action">
        <button class="call-action-btn btn-decline" onclick="decline()">✕</button>
        <span class="call-action-label">拒绝</span>
      </div>
      <div class="call-action">
        <button class="call-action-btn btn-answer" onclick="answer()">✓</button>
        <span class="call-action-label">接听</span>
      </div>
    </div>

    <div class="incoming-hint">来自对方的知音 · Powered by Nous</div>
  </div>

  <!-- 通话界面 -->
  <div class="call-screen" id="callScreen">
    <div class="call-header">
      <div class="call-header-name" id="callName">通话中</div>
      <div class="call-header-status"><div class="live-dot"></div><span id="callStatus">通话中</span></div>
    </div>
    <div class="chat-area" id="chat"></div>
    <div class="call-footer">
      <button class="hangup-btn" onclick="endCall()">✕</button>
    </div>
  </div>

  <script src="/TRTC.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const outboundId = params.get('id');
    const callerId = 'target_' + Math.random().toString(36).slice(2, 8);
    let trtc = null, taskData = null;

    // 加载任务信息
    async function loadTask() {
      if (!outboundId) {
        document.getElementById('callerDesc').textContent = '无效链接';
        return;
      }
      try {
        const res = await fetch(`/api/outbound/${outboundId}`);
        taskData = await res.json();
        if (taskData.error) {
          document.getElementById('callerDesc').textContent = '通话已结束';
          return;
        }
        
        document.getElementById('callerName').textContent = taskData.ownerName || '来电';
        document.getElementById('callerDesc').textContent = 'TA 有事要跟你说';
      } catch (e) {
        document.getElementById('callerDesc').textContent = '加载失败';
      }
    }

    function addBubble(type, text) {
      const chat = document.getElementById('chat');
      const d = document.createElement('div');
      d.className = 'bubble bubble-' + type;
      d.textContent = text;
      chat.appendChild(d);
      chat.scrollTop = chat.scrollHeight;
    }

    async function answer() {
      if (!taskData) return;
      
      // 切换到通话界面
      document.getElementById('incomingScreen').classList.add('hidden');
      document.getElementById('callScreen').classList.add('active');
      document.getElementById('callName').textContent = taskData.ownerName || '对方';
      document.getElementById('callStatus').textContent = '连接中...';

      try {
        // 1. 启动AI（代打模式）
        const startRes = await fetch('/api/outbound/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ outboundId, callerId }),
        });
        const startData = await startRes.json();
        if (!startData.success) throw new Error(startData.error);

        // 2. 进入TRTC房间
        const sigRes = await fetch(`/api/usersig/${callerId}`);
        const { sdkAppId, userId, userSig } = await sigRes.json();

        trtc = TRTC.create();
        await trtc.enterRoom({ sdkAppId, userId, userSig, roomId: taskData.roomId });
        await trtc.startLocalAudio({ option: { profile: 'speech' } });

        document.getElementById('callStatus').textContent = '通话中';
        addBubble('sys', '已接通');

        // 3. 监听字幕
        trtc.on(TRTC.EVENT.CUSTOM_MESSAGE, (event) => {
          try {
            const msg = JSON.parse(new TextDecoder().decode(event.data));
            if (msg.type === 10000 && msg.payload.end) {
              const isMe = msg.sender === callerId;
              addBubble(isMe ? 'user' : 'ai', msg.payload.text);
            }
          } catch {}
        });

        // 监听真身接入
        trtc.on(TRTC.EVENT.REMOTE_USER_ENTER, (event) => {
          if (event.userId.startsWith('owner_')) {
            addBubble('sys', '本人已接入通话');
            document.getElementById('callStatus').textContent = '已转接给本人';
          }
        });
      } catch (err) {
        document.getElementById('callStatus').textContent = '连接失败';
        addBubble('sys', '连接失败: ' + err.message);
      }
    }

    function decline() {
      document.getElementById('callerDesc').textContent = '已拒绝';
      document.querySelector('.call-actions').style.display = 'none';
    }

    async function endCall() {
      if (trtc) { await trtc.exitRoom(); trtc.destroy(); trtc = null; }
      document.getElementById('callStatus').textContent = '通话结束';
      addBubble('sys', '通话结束');
    }

    loadTask();
  </script>
</body>
</html>
