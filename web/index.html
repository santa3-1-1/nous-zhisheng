<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="/manifest.json">
  <title>知声</title>
  <style>
    :root {
      --bg: #0a0a0a; --bg-card: #141414; --bg-elevated: #1c1c1e;
      --border: #2c2c2e; --text: #fff; --text-2: #ebebf5cc; --text-3: #ebebf54d;
      --blue: #0a84ff; --green: #30d158; --orange: #ff9f0a; --red: #ff453a;
      --tab-h: 82px; --radius: 14px; --radius-sm: 10px;
      --safe-b: env(safe-area-inset-bottom, 0px);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text);
      overflow: hidden; position: fixed; width: 100%; height: 100%;
      -webkit-font-smoothing: antialiased;
    }
    #app { height: 100%; display: flex; flex-direction: column; }

    /* ===== Splash ===== */
    .splash {
      position: fixed; inset: 0; z-index: 9999; background: var(--bg);
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      transition: opacity 0.3s ease;
    }
    .splash.hide { opacity: 0; pointer-events: none; }
    .splash-logo { font-size: 48px; font-weight: 700; color: var(--blue); }
    .splash-sub { margin-top: 8px; color: var(--text-2); font-size: 14px; }

    /* ===== Login ===== */
    .login-page {
      position: fixed; inset: 0; z-index: 8000; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 24px;
    }
    .login-page.hidden { display: none; }
    .login-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .login-subtitle { color: var(--text-2); font-size: 15px; margin-bottom: 40px; }
    .login-form { width: 100%; max-width: 340px; }
    .login-input {
      width: 100%; height: 50px; border-radius: var(--radius-sm); border: 1px solid var(--border);
      background: var(--bg-card); color: var(--text); padding: 0 16px; font-size: 16px;
      margin-bottom: 12px; outline: none;
    }
    .login-input:focus { border-color: var(--blue); }
    .login-row { display: flex; gap: 12px; margin-bottom: 24px; }
    .login-row .login-input { flex: 1; margin-bottom: 0; }
    .sms-btn {
      height: 50px; padding: 0 16px; border: 1px solid var(--blue); border-radius: var(--radius-sm);
      background: transparent; color: var(--blue); font-size: 14px; white-space: nowrap; cursor: pointer;
    }
    .sms-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-btn {
      width: 100%; height: 50px; border-radius: var(--radius-sm); border: none;
      background: var(--blue); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer;
    }
    .login-btn:disabled { opacity: 0.6; }
    .demo-btn {
      margin-top: 16px; background: transparent; border: none; color: var(--text-3);
      font-size: 14px; cursor: pointer; text-decoration: underline;
    }

    /* ===== Onboarding ===== */
    .onboarding {
      position: fixed; inset: 0; z-index: 7000; background: var(--bg);
      display: flex; flex-direction: column; padding: 60px 24px 40px;
    }
    .onboarding.hidden { display: none; }
    .ob-progress { display: flex; gap: 4px; margin-bottom: 40px; }
    .ob-bar { flex: 1; height: 3px; border-radius: 2px; background: var(--border); overflow: hidden; }
    .ob-bar .fill { height: 100%; background: var(--blue); width: 0; transition: width 0.3s ease; }
    .ob-bar.done .fill { width: 100%; }
    .ob-bar.active .fill { width: 50%; animation: obPulse 1.5s ease infinite; }
    @keyframes obPulse { 0%,100%{width:30%} 50%{width:70%} }
    .ob-content { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .ob-step { display: none; flex-direction: column; align-items: center; text-align: center; }
    .ob-step.active { display: flex; }
    .ob-icon { font-size: 64px; margin-bottom: 24px; }
    .ob-title { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    .ob-desc { color: var(--text-2); font-size: 15px; line-height: 1.5; max-width: 300px; }
    .ob-input {
      width: 100%; max-width: 300px; height: 48px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg-card); color: var(--text);
      padding: 0 16px; font-size: 16px; margin-top: 20px; outline: none; text-align: center;
    }
    .ob-input:focus { border-color: var(--blue); }
    .ob-actions { display: flex; gap: 12px; padding-top: 24px; }
    .ob-next {
      flex: 1; height: 50px; border-radius: var(--radius-sm); border: none;
      background: var(--blue); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer;
    }
    .ob-skip {
      height: 50px; padding: 0 24px; border-radius: var(--radius-sm); border: 1px solid var(--border);
      background: transparent; color: var(--text-2); font-size: 16px; cursor: pointer;
    }

    /* ===== Main App ===== */
    .main-app { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .main-app.hidden { display: none; }

    /* Tab Content */
    .tab-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--tab-h) + var(--safe-b)); }
    .tab-panel { display: none; padding: 20px 16px; min-height: 100%; }
    .tab-panel.active { display: block; }

    /* Tab Bar */
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0; height: calc(var(--tab-h) + var(--safe-b));
      background: rgba(20,20,20,0.85); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-top: 0.5px solid var(--border); display: flex; align-items: flex-start;
      padding-top: 8px; padding-bottom: var(--safe-b); z-index: 5000;
    }
    .tab-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
      background: none; border: none; color: var(--text-3); font-size: 10px; cursor: pointer;
      padding: 4px 0; transition: color 0.2s;
    }
    .tab-item.active { color: var(--blue); }
    .tab-item svg { width: 24px; height: 24px; }

    /* ===== Common ===== */
    .section-title { font-size: 13px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; padding: 0 4px; }
    .card {
      background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border);
      padding: 16px; margin-bottom: 12px;
    }
    .btn {
      height: 44px; border-radius: var(--radius-sm); border: none; font-size: 15px;
      font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 6px; padding: 0 20px; transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.7; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }

    .spinner { width: 16px; height: 16px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600;
    }
    .badge-green { background: rgba(48,209,88,0.15); color: var(--green); }
    .badge-orange { background: rgba(255,159,10,0.15); color: var(--orange); }
    .badge-blue { background: rgba(10,132,255,0.15); color: var(--blue); }
    .badge-red { background: rgba(255,69,58,0.15); color: var(--red); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-3); }
    .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state-text { font-size: 15px; }

    /* Input */
    .input {
      width: 100%; height: 44px; border-radius: var(--radius-sm); border: 1px solid var(--border);
      background: var(--bg-elevated); color: var(--text); padding: 0 14px; font-size: 15px; outline: none;
    }
    .input:focus { border-color: var(--blue); }
    .textarea {
      width: 100%; min-height: 80px; border-radius: var(--radius-sm); border: 1px solid var(--border);
      background: var(--bg-elevated); color: var(--text); padding: 12px 14px; font-size: 15px;
      outline: none; resize: none; font-family: inherit;
    }
    .textarea:focus { border-color: var(--blue); }

    /* ===== Tab 1: Home ===== */
    .id-card { display: flex; align-items: center; justify-content: space-between; }
    .id-card-left { flex: 1; min-width: 0; }
    .id-card-label { font-size: 13px; color: var(--text-3); margin-bottom: 4px; }
    .id-card-url { font-size: 14px; color: var(--blue); word-break: break-all; }
    .copy-btn {
      width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg-elevated); color: var(--text-2); display: flex; align-items: center;
      justify-content: center; cursor: pointer; flex-shrink: 0; margin-left: 12px;
    }

    .status-indicator { display: flex; align-items: center; gap: 8px; padding: 16px 0; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.2)} }
    .status-text { font-size: 14px; color: var(--text-2); }

    .call-item { display: flex; flex-direction: column; gap: 6px; }
    .call-top { display: flex; align-items: center; justify-content: space-between; }
    .call-caller { font-size: 15px; font-weight: 600; }
    .call-time { font-size: 12px; color: var(--text-3); }
    .call-summary { font-size: 13px; color: var(--text-2); line-height: 1.4; }

    /* ===== Incoming Call Modal ===== */
    .call-modal {
      position: fixed; inset: 0; z-index: 9000; background: rgba(0,0,0,0.9);
      backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .call-modal.show { opacity: 1; pointer-events: all; }
    .call-modal-icon { font-size: 80px; margin-bottom: 24px; animation: ring 1s ease infinite; }
    @keyframes ring { 0%,100%{transform:rotate(0)} 20%{transform:rotate(15deg)} 40%{transform:rotate(-15deg)} 60%{transform:rotate(10deg)} 80%{transform:rotate(-5deg)} }
    .call-modal-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .call-modal-sub { font-size: 15px; color: var(--text-2); margin-bottom: 48px; }
    .call-modal-actions { display: flex; gap: 24px; }
    .call-action-btn {
      width: 72px; height: 72px; border-radius: 50%; border: none; display: flex;
      align-items: center; justify-content: center; cursor: pointer; font-size: 28px;
    }
    .call-accept { background: var(--green); color: #fff; }
    .call-decline { background: var(--red); color: #fff; }

    /* ===== Tab 2: Tasks ===== */
    .task-form { margin-bottom: 24px; }
    .task-form .input { margin-bottom: 10px; }
    .task-form .textarea { margin-bottom: 12px; }
    .task-item { display: flex; flex-direction: column; gap: 6px; cursor: pointer; }
    .task-top { display: flex; align-items: center; justify-content: space-between; }
    .task-name { font-size: 15px; font-weight: 600; }
    .task-instruction { font-size: 13px; color: var(--text-2); line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

    /* ===== Tab 3: Shaping ===== */
    .shaping-input-group { display: flex; gap: 10px; margin-bottom: 16px; }
    .shaping-input-group .textarea { flex: 1; min-height: 60px; }
    .shaping-input-group .btn { flex-shrink: 0; align-self: flex-end; }
    .knowledge-group { margin-top: 24px; }
    .knowledge-input-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .knowledge-input-row .input { flex: 1; }
    .rule-item, .knowledge-item {
      display: flex; align-items: center; justify-content: space-between; padding: 12px 0;
      border-bottom: 0.5px solid var(--border);
    }
    .rule-item:last-child, .knowledge-item:last-child { border-bottom: none; }
    .rule-text, .knowledge-text { flex: 1; font-size: 14px; color: var(--text-2); line-height: 1.4; padding-right: 12px; }
    .del-btn {
      width: 28px; height: 28px; border-radius: 50%; border: none; background: rgba(255,69,58,0.1);
      color: var(--red); display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px; flex-shrink: 0;
    }

    /* ===== Tab 4: Profile ===== */
    .settings-group { margin-bottom: 24px; }
    .settings-group-title { font-size: 13px; color: var(--text-3); text-transform: uppercase; margin-bottom: 8px; padding: 0 16px; }
    .settings-card { background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
    .settings-row {
      display: flex; align-items: center; justify-content: space-between; padding: 14px 16px;
      border-bottom: 0.5px solid var(--border);
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-label { font-size: 15px; }
    .settings-input {
      width: 180px; height: 36px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg-elevated); color: var(--text); padding: 0 12px; font-size: 14px;
      outline: none; text-align: right;
    }
    .settings-input:focus { border-color: var(--blue); }
    .settings-value { font-size: 14px; color: var(--text-2); }
    .logout-btn { width: 100%; margin-top: 12px; }

    /* ===== Toast ===== */
    .toast-container { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); z-index: 9500; pointer-events: none; }
    .toast {
      background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 12px 20px; font-size: 14px; color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      opacity: 0; transform: translateY(-10px); transition: all 0.3s ease; pointer-events: none;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
<div id="app">
  <!-- Splash Screen -->
  <div class="splash" id="splash">
    <div class="splash-logo">知声</div>
    <div class="splash-sub">AI 语音助手</div>
  </div>

  <!-- Login Page -->
  <div class="login-page" id="loginPage">
    <div class="login-title">欢迎使用知声</div>
    <div class="login-subtitle">用 AI 守护你的每一通来电</div>
    <div class="login-form">
      <input class="login-input" id="loginPhone" type="tel" placeholder="手机号" maxlength="11">
      <div class="login-row">
        <input class="login-input" id="loginCode" type="text" placeholder="验证码" maxlength="6">
        <button class="sms-btn" id="smsBtn" onclick="sendSms()">获取验证码</button>
      </div>
      <button class="login-btn" id="loginBtn" onclick="doLogin()">登录</button>
      <button class="demo-btn" onclick="demoLogin()">体验模式（免登录）</button>
    </div>
  </div>

  <!-- Onboarding -->
  <div class="onboarding hidden" id="onboarding">
    <div class="ob-progress" id="obProgress">
      <div class="ob-bar"><div class="fill"></div></div>
      <div class="ob-bar"><div class="fill"></div></div>
      <div class="ob-bar"><div class="fill"></div></div>
      <div class="ob-bar"><div class="fill"></div></div>
    </div>
    <div class="ob-content">
      <div class="ob-step active" data-step="0">
        <div class="ob-icon">📞</div>
        <div class="ob-title">AI 来电守护</div>
        <div class="ob-desc">知声会自动接听来电，理解对方意图，并按你的偏好应对</div>
      </div>
      <div class="ob-step" data-step="1">
        <div class="ob-icon">🧠</div>
        <div class="ob-title">塑造你的知声</div>
        <div class="ob-desc">告诉知声你的习惯和偏好，它会越来越懂你</div>
      </div>
      <div class="ob-step" data-step="2">
        <div class="ob-icon">📋</div>
        <div class="ob-title">代打电话</div>
        <div class="ob-desc">给知声一个指令，让它帮你主动拨出电话完成任务</div>
      </div>
      <div class="ob-step" data-step="3">
        <div class="ob-icon">👋</div>
        <div class="ob-title">你怎么称呼？</div>
        <div class="ob-desc">知声会用这个名字与来电方沟通</div>
        <input class="ob-input" id="obName" placeholder="请输入你的称呼">
      </div>
    </div>
    <div class="ob-actions">
      <button class="ob-skip" onclick="skipOnboarding()">跳过</button>
      <button class="ob-next" id="obNextBtn" onclick="nextOnboarding()">下一步</button>
    </div>
  </div>

  <!-- Main App -->
  <div class="main-app hidden" id="mainApp">
    <div class="tab-content">
      <!-- Tab 1: Home -->
      <div class="tab-panel active" id="panelHome">
        <div class="card id-card">
          <div class="id-card-left">
            <div class="id-card-label">你的知声来电链接</div>
            <div class="id-card-url" id="callLink">加载中...</div>
          </div>
          <button class="copy-btn" onclick="copyCallLink()">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          </button>
        </div>
        <div class="status-indicator">
          <div class="status-dot"></div>
          <div class="status-text">知声在线守护中</div>
        </div>
        <div class="section-title">通话记录</div>
        <div id="callList"></div>
      </div>

      <!-- Tab 2: Tasks -->
      <div class="tab-panel" id="panelTasks">
        <div class="section-title">新建代打任务</div>
        <div class="card task-form">
          <input class="input" id="taskTarget" placeholder="对方称呼（如：张医生）">
          <textarea class="textarea" id="taskInstruction" placeholder="指令内容（如：帮我预约下周三下午的门诊）"></textarea>
          <button class="btn btn-primary" style="width:100%" onclick="createTask()" id="createTaskBtn">生成链接</button>
        </div>
        <div class="section-title">已创建任务</div>
        <div id="taskList"></div>
      </div>

      <!-- Tab 3: Shaping -->
      <div class="tab-panel" id="panelShaping">
        <div class="section-title">塑造知声</div>
        <div class="card">
          <div class="shaping-input-group">
            <textarea class="textarea" id="shapingInput" placeholder="告诉知声你的偏好...&#10;例如：如果是快递电话，直接让对方放驿站"></textarea>
            <button class="btn btn-primary" onclick="addShaping()" id="addShapingBtn" style="height:60px">教给知声</button>
          </div>
        </div>
        <div class="knowledge-group">
          <div class="section-title">知识库</div>
          <div class="card">
            <div class="knowledge-input-row">
              <input class="input" id="knowledgeInput" placeholder="添加知识条目...">
              <button class="btn btn-primary" onclick="addKnowledge()" id="addKnowledgeBtn">添加</button>
            </div>
          </div>
        </div>
        <div class="section-title">知声已经学会的</div>
        <div class="card" id="shapingList" style="padding:4px 16px"></div>
      </div>

      <!-- Tab 4: Profile -->
      <div class="tab-panel" id="panelProfile">
        <div class="section-title" style="margin-top:12px">我的</div>
        <div class="settings-group">
          <div class="settings-group-title">个人信息</div>
          <div class="settings-card">
            <div class="settings-row">
              <span class="settings-label">姓名</span>
              <input class="settings-input" id="profileName" placeholder="未设置">
            </div>
            <div class="settings-row">
              <span class="settings-label">称呼</span>
              <input class="settings-input" id="profileNickname" placeholder="未设置">
            </div>
            <div class="settings-row">
              <span class="settings-label">职位</span>
              <input class="settings-input" id="profileTitle" placeholder="未设置">
            </div>
            <div class="settings-row">
              <span class="settings-label">公司</span>
              <input class="settings-input" id="profileCompany" placeholder="未设置">
            </div>
          </div>
        </div>
        <div class="settings-group">
          <div class="settings-group-title">通知方式</div>
          <div class="settings-card">
            <div class="settings-row">
              <span class="settings-label">当前方式</span>
              <span class="settings-value" id="notifyMethod">浏览器推送</span>
            </div>
          </div>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-bottom:12px" onclick="saveProfile()" id="saveProfileBtn">保存设置</button>
        <button class="btn btn-danger logout-btn" onclick="doLogout()">退出登录</button>
      </div>
    </div>

    <!-- Tab Bar -->
    <nav class="tab-bar">
      <button class="tab-item active" data-tab="panelHome" onclick="switchTab(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        <span>首页</span>
      </button>
      <button class="tab-item" data-tab="panelTasks" onclick="switchTab(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>
        <span>任务</span>
      </button>
      <button class="tab-item" data-tab="panelShaping" onclick="switchTab(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 014 4c0 2-2 3-2 6h-4c0-3-2-4-2-6a4 4 0 014-4z"/><path d="M10 18h4"/><path d="M10 22h4"/></svg>
        <span>塑造</span>
      </button>
      <button class="tab-item" data-tab="panelProfile" onclick="switchTab(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 10-16 0"/></svg>
        <span>我的</span>
      </button>
    </nav>
  </div>

  <!-- Call Modal -->
  <div class="call-modal" id="callModal">
    <div class="call-modal-icon">📱</div>
    <div class="call-modal-title" id="callModalTitle">来电</div>
    <div class="call-modal-sub" id="callModalSub">知声正在接听...</div>
    <div class="call-modal-actions">
      <button class="call-action-btn call-decline" onclick="declineCall()">✕</button>
      <button class="call-action-btn call-accept" onclick="acceptCall()">✓</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container"><div class="toast" id="toast"></div></div>
</div>

<script src="/TRTC.js"></script>
<script>
// ===== State =====
let currentTab = 'panelHome';
let obStep = 0;
let profile = {};
let pollTimer = null;
let currentNotification = null;

// ===== Splash =====
setTimeout(() => {
  document.getElementById('splash').classList.add('hide');
  setTimeout(() => {
    document.getElementById('splash').style.display = 'none';
    checkAuth();
  }, 300);
}, 600);

// ===== Auth =====
function checkAuth() {
  const token = localStorage.getItem('zs_token');
  if (token) {
    const onboarded = localStorage.getItem('zs_onboarded');
    if (!onboarded) {
      showOnboarding();
    } else {
      showMainApp();
    }
  } else {
    document.getElementById('loginPage').classList.remove('hidden');
  }
}

// ===== Login =====
function sendSms() {
  const phone = document.getElementById('loginPhone').value.trim();
  if (phone.length !== 11) { showToast('请输入正确的手机号'); return; }
  const btn = document.getElementById('smsBtn');
  btn.disabled = true;
  let sec = 60;
  btn.textContent = sec + 's';
  const t = setInterval(() => { sec--; btn.textContent = sec + 's'; if (sec <= 0) { clearInterval(t); btn.disabled = false; btn.textContent = '获取验证码'; } }, 1000);
  showToast('验证码已发送');
}

async function doLogin() {
  const phone = document.getElementById('loginPhone').value.trim();
  const code = document.getElementById('loginCode').value.trim();
  if (!phone || !code) { showToast('请填写手机号和验证码'); return; }
  const btn = document.getElementById('loginBtn');
  setLoading(btn, true);
  // Simulate login
  await sleep(800);
  localStorage.setItem('zs_token', 'demo_token_' + phone);
  localStorage.setItem('zs_phone', phone);
  setLoading(btn, false);
  document.getElementById('loginPage').classList.add('hidden');
  showOnboarding();
}

function demoLogin() {
  localStorage.setItem('zs_token', 'demo_token');
  localStorage.setItem('zs_phone', '13800000000');
  document.getElementById('loginPage').classList.add('hidden');
  showOnboarding();
}

// ===== Onboarding =====
function showOnboarding() {
  document.getElementById('onboarding').classList.remove('hidden');
  updateObProgress();
}

function updateObProgress() {
  const bars = document.querySelectorAll('.ob-bar');
  bars.forEach((bar, i) => {
    bar.classList.remove('done', 'active');
    if (i < obStep) bar.classList.add('done');
    else if (i === obStep) bar.classList.add('active');
  });
  document.querySelectorAll('.ob-step').forEach((s, i) => s.classList.toggle('active', i === obStep));
  document.getElementById('obNextBtn').textContent = obStep === 3 ? '开始使用' : '下一步';
}

function nextOnboarding() {
  if (obStep === 3) {
    const name = document.getElementById('obName').value.trim();
    if (name) { profile.nickname = name; }
    finishOnboarding();
  } else {
    obStep++;
    updateObProgress();
  }
}

function skipOnboarding() { finishOnboarding(); }

function finishOnboarding() {
  localStorage.setItem('zs_onboarded', '1');
  document.getElementById('onboarding').classList.add('hidden');
  showMainApp();
}

// ===== Main App =====
function showMainApp() {
  document.getElementById('mainApp').classList.remove('hidden');
  loadProfile();
  loadCalls();
  loadTasks();
  loadShaping();
  loadKnowledge();
  startPolling();
}

// ===== Tab Switch =====
function switchTab(el) {
  const tab = el.dataset.tab;
  if (tab === currentTab) return;
  currentTab = tab;
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
}

// ===== Home: Call Link =====
function loadCallLink() {
  const host = location.host;
  const link = host + '/call.html';
  document.getElementById('callLink').textContent = link;
}

function copyCallLink() {
  const link = document.getElementById('callLink').textContent;
  navigator.clipboard.writeText('https://' + link).then(() => showToast('已复制'));
}

// ===== Home: Calls =====
async function loadCalls() {
  loadCallLink();
  try {
    const res = await fetch('/api/calls');
    if (!res.ok) throw new Error();
    const calls = await res.json();
    renderCalls(calls);
  } catch(e) {
    renderCalls([]);
  }
}

function renderCalls(calls) {
  const el = document.getElementById('callList');
  if (!calls || calls.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📞</div><div class="empty-state-text">暂无通话记录</div></div>';
    return;
  }
  el.innerHTML = calls.map(c => {
    const status = c.status === 'completed' ? 'badge-green' : c.status === 'missed' ? 'badge-red' : 'badge-orange';
    const statusText = c.status === 'completed' ? '已完成' : c.status === 'missed' ? '未接' : '进行中';
    const time = formatTime(c.createdAt || c.timestamp);
    return `<div class="card call-item">
      <div class="call-top"><span class="call-caller">${esc(c.callerName || c.caller || '未知来电')}</span><span class="call-time">${time}</span></div>
      <div class="call-top"><span class="badge ${status}">${statusText}</span></div>
      ${c.summary ? `<div class="call-summary">${esc(c.summary)}</div>` : ''}
    </div>`;
  }).join('');
}

// ===== Polling Notifications =====
function startPolling() {
  pollTimer = setInterval(pollNotifications, 3000);
  pollNotifications();
}

async function pollNotifications() {
  try {
    const res = await fetch('/api/notifications');
    if (!res.ok) return;
    const data = await res.json();
    if (data && data.type === 'incoming_call' && (!currentNotification || currentNotification.id !== data.id)) {
      currentNotification = data;
      showCallModal(data);
    }
  } catch(e) {}
}

function showCallModal(data) {
  document.getElementById('callModalTitle').textContent = data.callerName || '来电';
  document.getElementById('callModalSub').textContent = data.message || '知声正在接听...';
  document.getElementById('callModal').classList.add('show');
}

async function acceptCall() {
  document.getElementById('callModal').classList.remove('show');
  showToast('正在接入通话...');
  try {
    const res = await fetch('/api/usersig/owner_xiaochen');
    if (!res.ok) throw new Error();
    const data = await res.json();
    // Join TRTC room
    if (window.TRTC) {
      const trtc = TRTC.create();
      await trtc.enterRoom({
        sdkAppId: data.sdkAppId,
        userId: data.userId,
        userSig: data.userSig,
        roomId: data.roomId || currentNotification.roomId
      });
      await trtc.startLocalAudio();
      showToast('已接入通话');
    }
  } catch(e) {
    showToast('接入失败');
  }
  currentNotification = null;
}

function declineCall() {
  document.getElementById('callModal').classList.remove('show');
  currentNotification = null;
  showToast('已拒绝来电');
}

// ===== Tab 2: Tasks =====
async function loadTasks() {
  try {
    const res = await fetch('/api/outbound');
    if (!res.ok) throw new Error();
    const tasks = await res.json();
    renderTasks(tasks);
  } catch(e) {
    renderTasks([]);
  }
}

function renderTasks(tasks) {
  const el = document.getElementById('taskList');
  if (!tasks || tasks.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-text">暂无代打任务</div></div>';
    return;
  }
  el.innerHTML = tasks.map(t => {
    const status = t.status === 'completed' ? 'badge-green' : t.status === 'in_progress' ? 'badge-orange' : 'badge-blue';
    const statusText = t.status === 'completed' ? '已完成' : t.status === 'in_progress' ? '通话中' : '等待接听';
    return `<div class="card task-item" onclick="copyTaskLink('${esc(t.link || t.id || '')}')">
      <div class="task-top"><span class="task-name">${esc(t.targetName || '未知')}</span><span class="badge ${status}">${statusText}</span></div>
      <div class="task-instruction">${esc(t.instruction || '')}</div>
    </div>`;
  }).join('');
}

async function createTask() {
  const target = document.getElementById('taskTarget').value.trim();
  const instruction = document.getElementById('taskInstruction').value.trim();
  if (!target || !instruction) { showToast('请填写完整信息'); return; }
  const btn = document.getElementById('createTaskBtn');
  setLoading(btn, true);
  try {
    const res = await fetch('/api/outbound/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ targetName: target, instruction })
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    showToast('任务已创建');
    document.getElementById('taskTarget').value = '';
    document.getElementById('taskInstruction').value = '';
    loadTasks();
    if (data.link) {
      navigator.clipboard.writeText(data.link).then(() => showToast('链接已复制'));
    }
  } catch(e) {
    showToast('创建失败');
  }
  setLoading(btn, false);
}

function copyTaskLink(link) {
  if (!link) return;
  const url = link.startsWith('http') ? link : location.origin + '/' + link;
  navigator.clipboard.writeText(url).then(() => showToast('链接已复制'));
}

// ===== Tab 3: Shaping =====
let shapingRules = [];
let knowledgeItems = [];

async function loadShaping() {
  try {
    const res = await fetch('/api/shaping');
    if (!res.ok) throw new Error();
    shapingRules = await res.json();
  } catch(e) { shapingRules = []; }
  renderShapingList();
}

async function loadKnowledge() {
  try {
    const res = await fetch('/api/knowledge');
    if (!res.ok) throw new Error();
    knowledgeItems = await res.json();
  } catch(e) { knowledgeItems = []; }
  renderShapingList();
}

function renderShapingList() {
  const el = document.getElementById('shapingList');
  let html = '';
  if (shapingRules.length === 0 && knowledgeItems.length === 0) {
    html = '<div class="empty-state" style="padding:24px"><div class="empty-state-text">还没有教给知声任何东西</div></div>';
  } else {
    shapingRules.forEach((r, i) => {
      const text = typeof r === 'string' ? r : r.instruction || r.text || '';
      html += `<div class="rule-item"><span class="rule-text">🎯 ${esc(text)}</span><button class="del-btn" onclick="deleteShaping(${i})">×</button></div>`;
    });
    knowledgeItems.forEach(k => {
      const text = typeof k === 'string' ? k : k.text || k.content || '';
      const id = k.id || k._id || '';
      html += `<div class="knowledge-item"><span class="knowledge-text">📚 ${esc(text)}</span><button class="del-btn" onclick="deleteKnowledge('${esc(id)}')">×</button></div>`;
    });
  }
  el.innerHTML = html;
}

async function addShaping() {
  const input = document.getElementById('shapingInput');
  const text = input.value.trim();
  if (!text) { showToast('请输入塑造规则'); return; }
  const btn = document.getElementById('addShapingBtn');
  setLoading(btn, true);
  try {
    const res = await fetch('/api/shaping', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ instruction: text })
    });
    if (!res.ok) throw new Error();
    input.value = '';
    showToast('已教给知声');
    loadShaping();
  } catch(e) { showToast('添加失败'); }
  setLoading(btn, false);
}

async function deleteShaping(index) {
  try {
    const res = await fetch('/api/shaping/' + index, { method: 'DELETE' });
    if (!res.ok) throw new Error();
    showToast('已删除');
    loadShaping();
  } catch(e) { showToast('删除失败'); }
}

async function addKnowledge() {
  const input = document.getElementById('knowledgeInput');
  const text = input.value.trim();
  if (!text) { showToast('请输入知识内容'); return; }
  const btn = document.getElementById('addKnowledgeBtn');
  setLoading(btn, true);
  try {
    const res = await fetch('/api/knowledge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, source: 'manual' })
    });
    if (!res.ok) throw new Error();
    input.value = '';
    showToast('已添加');
    loadKnowledge();
  } catch(e) { showToast('添加失败'); }
  setLoading(btn, false);
}

async function deleteKnowledge(id) {
  if (!id) return;
  try {
    const res = await fetch('/api/knowledge/' + id, { method: 'DELETE' });
    if (!res.ok) throw new Error();
    showToast('已删除');
    loadKnowledge();
  } catch(e) { showToast('删除失败'); }
}

// ===== Tab 4: Profile =====
async function loadProfile() {
  try {
    const res = await fetch('/api/profile');
    if (!res.ok) throw new Error();
    profile = await res.json();
    document.getElementById('profileName').value = profile.name || '';
    document.getElementById('profileNickname').value = profile.nickname || '';
    document.getElementById('profileTitle').value = profile.title || '';
    document.getElementById('profileCompany').value = profile.company || '';
    document.getElementById('notifyMethod').textContent = profile.notifyMethod || '浏览器推送';
  } catch(e) {}
}

async function saveProfile() {
  const btn = document.getElementById('saveProfileBtn');
  setLoading(btn, true);
  const data = {
    name: document.getElementById('profileName').value.trim(),
    nickname: document.getElementById('profileNickname').value.trim(),
    title: document.getElementById('profileTitle').value.trim(),
    company: document.getElementById('profileCompany').value.trim()
  };
  try {
    const res = await fetch('/api/profile', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error();
    showToast('已保存');
  } catch(e) { showToast('保存失败'); }
  setLoading(btn, false);
}

function doLogout() {
  if (!confirm('确定退出登录？')) return;
  localStorage.removeItem('zs_token');
  localStorage.removeItem('zs_onboarded');
  localStorage.removeItem('zs_phone');
  if (pollTimer) clearInterval(pollTimer);
  location.reload();
}

// ===== Utils =====
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function setLoading(btn, loading) {
  if (loading) {
    btn.dataset.text = btn.textContent;
    btn.innerHTML = '<span class="spinner"></span>';
    btn.disabled = true;
  } else {
    btn.textContent = btn.dataset.text || '';
    btn.disabled = false;
  }
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff/60000) + '分钟前';
  if (diff < 86400000) return Math.floor(diff/3600000) + '小时前';
  return (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ===== Service Worker =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
